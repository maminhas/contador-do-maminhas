<!DOCTYPE html>
<html>
    <head>
        <title>contador</title>

        <style>
            * {
                margin: 0;
                box-sizing: border-box;
            }
            body {
                background-image: url("imagens/754787.png");
                min-height: 100vh;
                display: grid;
                place-items: center;
            }
            section {
                color: #fff;
                background-color: #666;
                border-radius: 30px;
                text-align: center;
                padding: 20px;
            }
            p {
                font-size: 100px;
            }
            h1 {
                font-size: 60px;
            }
            button {
                border-radius: 1000px;
                font-size: 30px;
                width: 100px;
            }
            button.mais, button.menos {
                font-size: 50px;
            }
            button.reset {
                padding: 10px;
            }
        </style>
    </head>
    <body>

        <section>
            <h1>Contador</h1>
            <p>0</p>
            <button class="menos" onclick="menos()">-</button>
            <button class="reset"onclick="reset()">reset</button>
            <button class="mais" onclick="mais()">+</button>
        </section>

        <script>
            let numero = 0

            function menos() {
                numero--
                render()
            }

            function reset() {
                numero = 0
                render()
            }
            
            function mais() {
                numero++
                render()
            }

            function render() {
                const p =document.querySelector("p")
                p.innerText = numero
            }
        </script>

    </body>
</html>
